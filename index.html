<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>로또 번호 생성기</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>

    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <div class="brand-logo" aria-hidden="true">L</div>
          <div class="brand-text">
            <span class="brand-name">로또 생성기</span>
            <span class="brand-tag">6/45</span>
          </div>
        </div>

        <div class="topbar-actions">
          <!-- 소리 토글 -->
          <button class="topbar-btn" id="soundButton" type="button" title="소리 켜기/끄기" aria-label="소리 켜기/끄기">
            <svg id="soundIconOn" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
            </svg>
            <svg id="soundIconOff" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:none">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <line x1="23" y1="9" x2="17" y2="15"/>
              <line x1="17" y1="9" x2="23" y2="15"/>
            </svg>
          </button>

          <!-- 다크모드 토글 -->
          <button class="topbar-btn" id="topThemeButton" type="button" title="테마 변경" aria-label="테마 변경">
            <svg id="moonIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
            <svg id="sunIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:none">
              <circle cx="12" cy="12" r="5"/>
              <line x1="12" y1="1" x2="12" y2="3"/>
              <line x1="12" y1="21" x2="12" y2="23"/>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
              <line x1="1" y1="12" x2="3" y2="12"/>
              <line x1="21" y1="12" x2="23" y2="12"/>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
          </button>

          <!-- 전체화면 토글 -->
          <button class="topbar-btn" id="fullscreenButton" type="button" title="전체 화면" aria-label="전체 화면">
            <svg id="expandIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
            </svg>
            <svg id="compressIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:none">
              <path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <main class="app">
      <section class="panel generator" aria-labelledby="app-title">
        <div class="title-row">
          <div>
            <p class="eyebrow">LOTTO 6/45</p>
            <h1 id="app-title">로또 번호 생성기</h1>
          </div>
        </div>

        <div class="controls" aria-label="생성 설정">
          <label class="field">
            <span>게임 수</span>
            <select id="gameCount">
              <option value="1">1게임</option>
              <option value="3">3게임</option>
              <option value="5" selected>5게임</option>
              <option value="10">10게임</option>
            </select>
          </label>

          <label class="switch">
            <input id="includeBonus" type="checkbox" />
            <span>보너스 번호</span>
          </label>
        </div>

        <div class="actions">
          <button class="primary" id="generateButton" type="button">번호 생성</button>
          <button class="secondary" id="copyButton" type="button">복사</button>
          <button class="secondary" id="clearButton" type="button">초기화</button>
        </div>

        <p class="shortcut-hint">
          <kbd class="kbd">Space</kbd> 또는 <kbd class="kbd">Enter</kbd>로 빠르게 생성
        </p>

        <div class="stats" aria-label="요약">
          <div>
            <strong id="totalGames">0</strong>
            <span>생성 게임</span>
          </div>
          <div>
            <strong id="favoriteRange">-</strong>
            <span>최다 구간</span>
          </div>
          <div>
            <strong id="lastGenerated">-</strong>
            <span>최근 생성</span>
          </div>
        </div>
      </section>

      <section class="results" aria-labelledby="result-title">
        <div class="section-heading">
          <h2 id="result-title">생성 결과</h2>
        </div>
        <div id="resultList" class="result-list">
          <p class="empty">번호 생성 버튼을 누르면 추천 조합이 표시됩니다.</p>
        </div>
      </section>

      <section class="panel history" aria-labelledby="history-title">
        <div class="section-heading">
          <h2 id="history-title">저장된 조합 <span id="savedCount" class="count-badge"></span></h2>
          <button class="text-button" id="deleteSavedButton" type="button">전체 삭제</button>
        </div>
        <div id="savedList" class="saved-list">
          <p class="empty">마음에 드는 조합을 저장해 보세요.</p>
        </div>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="script.js"></script>
  </body>
</html>
